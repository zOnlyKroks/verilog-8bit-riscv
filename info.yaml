# Tiny Tapeout project information
project:
  title:        "8-bit RISC-V Processor"      # Project title
  author:       "Finn Rades (zOnlyKroks)"     # Your name
  discord:      "zOnlyKroks"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A complete 8-bit RISC-V processor with external I2C EEPROM, implementing RV32I base instruction set"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (10 MHz target)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_zonlykroks_8bit_riscv"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "riscv_cpu.v"
    - "i2c_controller.v"
    - "alu.v"
    - "register_file.v"
    - "control_unit.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "DEBUG_EN"      # Debug mode enable
  ui[1]: ""              # Unused
  ui[2]: ""              # Unused
  ui[3]: ""              # Unused
  ui[4]: ""              # Unused
  ui[5]: ""              # Unused
  ui[6]: ""              # Unused
  ui[7]: ""              # Unused

  # Outputs
  uo[0]: "PC[0]"         # Program Counter bit 0
  uo[1]: "PC[1]"         # Program Counter bit 1
  uo[2]: "PC[2]"         # Program Counter bit 2
  uo[3]: "PC[3]"         # Program Counter bit 3
  uo[4]: "ADDR[0]"       # EEPROM Address bit 0
  uo[5]: "ADDR[1]"       # EEPROM Address bit 1
  uo[6]: "ADDR[2]"       # EEPROM Address bit 2
  uo[7]: "ADDR[3]"       # EEPROM Address bit 3

  # Bidirectional pins
  uio[0]: "SCL"          # I2C Clock output
  uio[1]: "SDA"          # I2C Data (bidirectional)
  uio[2]: "ADDR[14]"     # EEPROM Address bit 14
  uio[3]: "ADDR[15]"     # EEPROM Address bit 15
  uio[4]: "PC[6]"        # Program Counter bit 6
  uio[5]: "PC[7]"        # Program Counter bit 7
  uio[6]: "HALT"         # CPU halt signal
  uio[7]: "VALID"        # Output valid signal

# Do not change!
yaml_version: 6
